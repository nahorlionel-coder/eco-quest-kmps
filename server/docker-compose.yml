version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    container_name: ecoquest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ecoquest
      POSTGRES_PASSWORD: ecoquest
      POSTGRES_DB: ecoquest
    ports:
      - "5432:5432"
    volumes:
      - ecoquest_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecoquest"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ecoquest_pgdata:
